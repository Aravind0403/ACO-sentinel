apiVersion: v1
kind: ServiceAccount
metadata:
  name: aco-scheduler-sa
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aco-scheduler-role-binding
subjects:
  - kind: ServiceAccount
    name: aco-scheduler-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: system:kube-scheduler
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aco-scheduler-volume-binding
subjects:
  - kind: ServiceAccount
    name: aco-scheduler-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: system:volume-scheduler
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aco-scheduler-config
  namespace: kube-system
data:
  scheduler-config.yaml: |
    apiVersion: kubescheduler.config.k8s.io/v1
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: false
    profiles:
      - schedulerName: aco-sentinel-scheduler
        plugins:
          preScore:
            enabled:
              - name: ACOPredictiveScheduler
          score:
            enabled:
              - name: ACOPredictiveScheduler
                weight: 100
          reserve:
            enabled:
              - name: ACOPredictiveScheduler
          preBind:
            enabled:
              - name: ACOPredictiveScheduler
          postBind:
            enabled:
              - name: ACOPredictiveScheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aco-sentinel-scheduler
  namespace: kube-system
  labels:
    app: aco-sentinel-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aco-sentinel-scheduler
  template:
    metadata:
      labels:
        app: aco-sentinel-scheduler
    spec:
      serviceAccountName: aco-scheduler-sa
      nodeSelector:
        cloud.google.com/gke-nodepool: gpu-pool
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"
      containers:
        - name: scheduler
          image: us-central1-docker.pkg.dev/starry-trilogy-503219-s4/aco-sentinel/scheduler:v2.0
          imagePullPolicy: Always
          command:
            - /bin/kube-scheduler
            - --config=/etc/kubernetes/scheduler/scheduler-config.yaml
            - --v=2
          volumeMounts:
            - name: config-volume
              mountPath: /etc/kubernetes/scheduler
        - name: sidecar
          image: us-central1-docker.pkg.dev/starry-trilogy-503219-s4/aco-sentinel/sidecar:v2.0
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
      volumes:
        - name: config-volume
          configMap:
            name: aco-scheduler-config
